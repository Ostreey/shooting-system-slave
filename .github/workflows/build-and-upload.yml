name: Build and Release Firmware

on:
  push:
    branches: [ main, multi-board ]

permissions:
  contents: write
  actions: read

jobs:
  build-and-release:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout code
      uses: actions/checkout@v4
      with:
        submodules: false

    - name: Setup Python
      uses: actions/setup-python@v4
      with:
        python-version: '3.10'

    - name: Install PlatformIO
      run: |
        python -m pip install --upgrade pip
        pip install platformio

    - name: Clean PlatformIO cache
      run: |
        pio run --target clean
        rm -rf .pio/libdeps/

    - name: Build firmware (both boards)
      run: |
        pio run

    - name: Extract version from source
      id: version
      run: |
        VERSION=$(grep -o '#define FIRMWARE_VERSION "[^"]*"' src/Config.h | cut -d'"' -f2)
        echo "version=$VERSION" >> $GITHUB_OUTPUT
        echo "Firmware version: $VERSION"

    - name: Create build artifacts
      run: |
        mkdir -p build-output

        # ESP32 firmware
        cp .pio/build/esp32/firmware.bin build-output/firmware-esp32.bin
        cat > build-output/metadata-esp32.json << EOF
        {
          "version": "${{ steps.version.outputs.version }}",
          "board": "esp32",
          "buildDate": "$(date -u +%Y-%m-%d)",
          "buildTime": "$(date -u +%H:%M:%S)",
          "fileSize": $(stat -c%s .pio/build/esp32/firmware.bin),
          "changelog": "Auto-built from GitHub commit ${{ github.sha }}",
          "commitHash": "${{ github.sha }}"
        }
        EOF

        # ESP32-S3 firmware
        cp .pio/build/esp32-s3/firmware.bin build-output/firmware-esp32s3.bin
        cat > build-output/metadata-esp32s3.json << EOF
        {
          "version": "${{ steps.version.outputs.version }}",
          "board": "esp32s3",
          "buildDate": "$(date -u +%Y-%m-%d)",
          "buildTime": "$(date -u +%H:%M:%S)",
          "fileSize": $(stat -c%s .pio/build/esp32-s3/firmware.bin),
          "changelog": "Auto-built from GitHub commit ${{ github.sha }}",
          "commitHash": "${{ github.sha }}"
        }
        EOF

    - name: Create Release
      uses: softprops/action-gh-release@v1
      with:
        tag_name: v${{ steps.version.outputs.version }}
        name: Firmware v${{ steps.version.outputs.version }}
        body: |
          ## Firmware Release v${{ steps.version.outputs.version }}

          **Build Date:** $(date -u +%Y-%m-%d)
          **Commit:** ${{ github.sha }}

          ### Files:
          - `firmware-esp32.bin` — ESP32 (stare urządzenia)
          - `metadata-esp32.json` — Build info ESP32
          - `firmware-esp32s3.bin` — ESP32-S3 (nowe urządzenia, BLE Long Range)
          - `metadata-esp32s3.json` — Build info ESP32-S3

          ### Installation:
          1. Download the correct firmware.bin for your board
          2. Use your Shooting Buddy app to update the device
        files: |
          build-output/firmware-esp32.bin
          build-output/metadata-esp32.json
          build-output/firmware-esp32s3.bin
          build-output/metadata-esp32s3.json
        draft: false
        prerelease: false
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
